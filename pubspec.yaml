name: here
description: A offline-first social networking app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Core
  drift: ^2.14.1
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.1
  path: ^1.9.0
  
  # State Management
  hooks_riverpod: ^2.4.9
  flutter_hooks: ^0.20.5
  riverpod_annotation: ^2.3.3
  
  # Encryption - REPLACED flutter_sodium with sodium_libs
  sodium_libs: ^3.0.0 # More compatible with modern ffi
  local_auth: ^2.1.7
  flutter_secure_storage: ^9.0.0
  pointycastle: ^3.7.3
  crypto: ^3.0.3
  encrypt: ^5.0.3
  
  # Network
  dio: ^5.4.0
  web_socket_channel: ^2.4.0
  connectivity_plus: ^6.0.0

  
  # Media
  image_picker: ^1.0.5
  video_thumbnail: ^0.5.3
  image: ^4.1.3
  cached_network_image: ^3.3.1
  video_player: ^2.8.2
  photo_view: ^0.14.0
  
  # UI
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.0
  
  # Utils
  intl: ^0.18.1
  uuid: ^4.3.3
  collection: ^1.18.0
  timeago: ^3.6.0
  url_launcher: ^6.2.4
  
  # Background Tasks
  workmanager: ^0.5.2+r2
  flutter_local_notifications: ^17.1.0
  drift_dev: ^2.28.0
  build_runner: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.3.9
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - images/logo.png
    - images/placeholder.png
